name: Build mybilibili OBS Plugin

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: ubuntu-x86_64
            ext: so
          - os: windows-2022
            artifact: windows-x64
            ext: dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: (Windows) Install vcpkg + deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install vcpkg
          git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          # Install OBS, Qt6, CURL via vcpkg
          & C:\vcpkg\vcpkg install obs-studio:x64-windows qt6:x64-windows curl:x64-windows --clean-after-build

      - name: (Ubuntu) Install system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libobs-dev \
            qt6-base-dev qt6-base-dev-tools \
            libcurl4-openssl-dev

      - name: Configure
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            cmake -B build -G "Visual Studio 17 2022" -A x64 `
              -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DENABLE_FRONTEND_API=ON -DENABLE_QT=ON `
              -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake"
          } else {
            cmake -B build -G "Unix Makefiles" `
              -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DENABLE_FRONTEND_API=ON -DENABLE_QT=ON
          }

      - name: Build
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-${{ matrix.artifact }}
          path: build/*.${{ matrix.ext }}