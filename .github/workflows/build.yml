name: Build mybilibili OBS Plugin (Windows)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup VS
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: .\.github\scripts\Build-Windows.ps1

      - name: Include VC++ Runtime DLL
        shell: pwsh
        run: |
          # Find VCRUNTIME140_1.dll anywhere on the system.
          # VS 2022 Enterprise on the CI runner may install to non-default paths.
          $candidates = Get-ChildItem -Path 'C:\','D:\' -Recurse -Filter 'VCRUNTIME140_1.dll' -ErrorAction SilentlyContinue 2>$null | Select-Object -First 5
          if ($candidates) {
            foreach ($f in $candidates) {
              Write-Host "Found: $($f.FullName)"
            }
            Copy-Item $candidates[0].FullName build_x64\RelWithDebInfo\ -Force
            Write-Host "Copied to build_x64\RelWithDebInfo\VCRUNTIME140_1.dll"
          } else {
            Write-Warning "VCRUNTIME140_1.dll not found anywhere on CI runner"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-windows-x64
          path: build_x64/RelWithDebInfo/*.dll