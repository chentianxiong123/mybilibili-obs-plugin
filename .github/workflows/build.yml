name: Build mybilibili OBS Plugin (Windows)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup VS
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: .\.github\scripts\Build-Windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-windows-x64
          path: build_x64/RelWithDebInfo/*.dll