name: Build mybilibili OBS Plugin

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 🪟
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v2

      - name: Download OBS deps
        shell: pwsh
        run: |
          Write-Host "Downloading OBS dependencies..."
          # OBS dependencies (libobs + CURL + FFmpeg + etc)
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2026-06-02/windows-deps-2026-06-02-x64.zip" -OutFile "$env:RUNNER_TEMP\deps.zip"
          Expand-Archive "$env:RUNNER_TEMP\deps.zip" -DestinationPath "$env:RUNNER_TEMP\obs-deps" -Force
          Write-Host "OBS deps done"

          # Qt6 dependencies
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2026-06-02/windows-deps-qt6-2026-06-02-x64-RelWithDebInfo.zip" -OutFile "$env:RUNNER_TEMP\qt6.zip"
          Expand-Archive "$env:RUNNER_TEMP\qt6.zip" -DestinationPath "$env:RUNNER_TEMP\qt6" -Force
          Write-Host "Qt6 deps done"

          # List contents for debugging
          Write-Host "obs-deps contents:"
          Get-ChildItem "$env:RUNNER_TEMP\obs-deps" -Depth 0 | Select-Object Name

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP\obs-deps;$env:RUNNER_TEMP\qt6" `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DENABLE_FRONTEND_API=ON -DENABLE_QT=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config RelWithDebInfo --parallel

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-windows-x64
          path: |
            build/RelWithDebInfo/*.dll
            build/**/*.pdb

  build-ubuntu:
    name: Ubuntu x86_64 🐧
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libobs-dev \
            qt6-base-dev libqt6core6 libqt6gui6 libqt6widgets6 \
            libcurl4-openssl-dev

      - name: Configure & Build
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_FRONTEND_API=ON -DENABLE_QT=ON
          cmake --build build --parallel $(nproc)

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-ubuntu-x86_64
          path: build/*.so
