name: Build mybilibili OBS Plugin

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 🪟
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Visual Studio shell
        uses: microsoft/setup-msbuild@v2

      - name: Run Windows build script
        shell: pwsh
        run: |
          .github/scripts/Build-Windows.ps1 -Target x64 -Configuration RelWithDebInfo

      - name: Upload plugin DLL
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-windows-x64
          path: release/RelWithDebInfo/

  build-ubuntu:
    name: Ubuntu x86_64 🐧
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential ccache \
            libobs-dev \
            qt6-base-dev libqt6core6 libqt6gui6 libqt6widgets6 \
            libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_FRONTEND_API=ON -DENABLE_QT=ON
          cmake --build build --parallel $(nproc)

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: mybilibili-obs-plugin-ubuntu-x86_64
          path: build/*.so